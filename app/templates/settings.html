<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Settings — Bambu Gateway</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header>
    <h1>Bambu Gateway</h1>
    <nav><a href="/">Dashboard</a></nav>
  </header>

  <main>
    <section>
      <div class="section-header">
        <h2>Printers</h2>
        <button type="button" class="btn-sm" onclick="openAddPrinter()">Add Printer</button>
      </div>
      <div id="printer-list"><p class="muted">Loading...</p></div>
      <p id="form-status" class="muted"></p>
    </section>

    <section id="push-section">
      <h2>Push Notifications</h2>
      <p id="push-status" class="muted">Loading...</p>
      <div id="device-list"></div>
      <p id="push-message" class="muted"></p>
    </section>
  </main>

  <dialog id="printer-dialog" class="modal">
    <form id="printer-form" method="dialog">
      <h2 id="form-title">Add Printer</h2>
      <input type="hidden" id="edit-serial">
      <div class="form-row">
        <div class="form-group">
          <label for="input-name">Name</label>
          <input type="text" id="input-name" placeholder="My Printer">
        </div>
        <div class="form-group">
          <label for="input-serial">Serial</label>
          <input type="text" id="input-serial" required>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="input-ip">IP Address</label>
          <input type="text" id="input-ip" required>
        </div>
        <div class="form-group">
          <label for="input-code">Access Code</label>
          <input type="password" id="input-code">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="input-machine">Machine Model</label>
          <select id="input-machine">
            <option value="">None (no filament filtering)</option>
          </select>
        </div>
      </div>
      <p id="dialog-status" class="muted"></p>
      <div class="form-actions">
        <button type="button" class="btn-cancel" onclick="closePrinterDialog()">Cancel</button>
        <button type="submit" id="btn-submit">Add Printer</button>
      </div>
    </form>
  </dialog>

  <script>
    const printerList = document.getElementById('printer-list');
    const form = document.getElementById('printer-form');
    const formTitle = document.getElementById('form-title');
    const formStatus = document.getElementById('form-status');
    const dialogStatus = document.getElementById('dialog-status');
    const btnSubmit = document.getElementById('btn-submit');
    const editSerial = document.getElementById('edit-serial');
    const inputName = document.getElementById('input-name');
    const inputSerial = document.getElementById('input-serial');
    const inputIp = document.getElementById('input-ip');
    const inputCode = document.getElementById('input-code');
    const inputMachine = document.getElementById('input-machine');
    const printerDialog = document.getElementById('printer-dialog');

    let editing = false;
    let machinesLoaded = false;

    async function loadMachines() {
      if (machinesLoaded) return;
      try {
        const resp = await fetch('/api/slicer/machines');
        if (resp.ok) {
          const machines = await resp.json();
          for (const m of machines) {
            const opt = document.createElement('option');
            opt.value = m.setting_id;
            opt.textContent = m.name;
            inputMachine.appendChild(opt);
          }
        }
      } catch {}
      machinesLoaded = true;
    }

    async function refresh() {
      try {
        const resp = await fetch('/api/settings/printers');
        const data = await resp.json();
        renderPrinters(data.printers);
      } catch (e) {
        printerList.innerHTML = '<p class="muted">Could not reach server.</p>';
      }
    }

    function renderPrinters(printers) {
      if (!printers.length) {
        printerList.innerHTML = '<p class="muted">No printers configured.</p>';
        return;
      }

      printerList.innerHTML = printers.map(p => `
        <div class="settings-card">
          <div class="settings-card-header">
            <strong>${p.name || 'Printer ' + p.serial.slice(-4)}</strong>
            <div class="settings-card-actions">
              <button class="btn-sm btn-edit" onclick="startEdit('${p.serial}', '${esc(p.name)}', '${esc(p.ip)}', '${esc(p.machine_model)}')">Edit</button>
              <button class="btn-sm btn-danger" onclick="deletePrinter('${p.serial}')">Delete</button>
            </div>
          </div>
          <div class="settings-card-detail">
            ${p.ip} &middot; ${p.serial}${p.machine_model ? ' &middot; ' + p.machine_model : ''}
          </div>
        </div>
      `).join('');
    }

    function esc(str) {
      return (str || '').replace(/'/g, "\\'").replace(/"/g, '&quot;');
    }

    async function openAddPrinter() {
      await loadMachines();
      editing = false;
      editSerial.value = '';
      form.reset();
      inputSerial.readOnly = false;
      inputCode.placeholder = '';
      inputMachine.value = '';
      formTitle.textContent = 'Add Printer';
      btnSubmit.textContent = 'Add Printer';
      dialogStatus.textContent = '';
      dialogStatus.className = 'muted';
      printerDialog.showModal();
      inputName.focus();
    }

    async function startEdit(serial, name, ip, machineModel) {
      await loadMachines();
      editing = true;
      editSerial.value = serial;
      inputSerial.value = serial;
      inputSerial.readOnly = true;
      inputName.value = name;
      inputIp.value = ip;
      inputCode.value = '';
      inputCode.placeholder = '(unchanged)';
      inputMachine.value = machineModel || '';
      formTitle.textContent = 'Edit Printer';
      btnSubmit.textContent = 'Save Changes';
      dialogStatus.textContent = '';
      dialogStatus.className = 'muted';
      printerDialog.showModal();
      inputName.focus();
    }

    function closePrinterDialog() {
      printerDialog.close();
      editing = false;
      editSerial.value = '';
      form.reset();
      inputSerial.readOnly = false;
      inputCode.placeholder = '';
      inputMachine.value = '';
    }

    async function deletePrinter(serial) {
      if (!confirm('Remove this printer?')) return;
      try {
        const resp = await fetch(`/api/settings/printers/${serial}`, {
          method: 'DELETE',
        });
        if (resp.ok) {
          formStatus.textContent = 'Printer removed.';
          formStatus.className = 'success';
          refresh();
        } else {
          const data = await resp.json();
          formStatus.textContent = data.detail || 'Delete failed';
          formStatus.className = 'error-text';
        }
      } catch (e) {
        formStatus.textContent = 'Network error';
        formStatus.className = 'error-text';
      }
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      await loadMachines();
      const payload = {
        serial: inputSerial.value.trim(),
        ip: inputIp.value.trim(),
        access_code: inputCode.value,
        name: inputName.value.trim(),
        machine_model: inputMachine.value,
      };

      let url, method;
      if (editing) {
        url = `/api/settings/printers/${editSerial.value}`;
        method = 'PUT';
      } else {
        url = '/api/settings/printers';
        method = 'POST';
      }

      try {
        const resp = await fetch(url, {
          method,
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });
        const data = await resp.json();
        if (resp.ok) {
          formStatus.textContent = editing ? 'Printer updated.' : 'Printer added.';
          formStatus.className = 'success';
          closePrinterDialog();
          refresh();
        } else {
          dialogStatus.textContent = data.detail || 'Save failed';
          dialogStatus.className = 'error-text';
        }
      } catch (e) {
        dialogStatus.textContent = 'Network error';
        dialogStatus.className = 'error-text';
      }
    });

    const pushStatus = document.getElementById('push-status');
    const deviceList = document.getElementById('device-list');
    const pushMessage = document.getElementById('push-message');

    function formatDateTime(iso) {
      if (!iso) return '—';
      try {
        const d = new Date(iso);
        if (isNaN(d.getTime())) return iso;
        return d.toLocaleString();
      } catch {
        return iso;
      }
    }

    async function refreshPush() {
      try {
        const capsResp = await fetch('/api/capabilities');
        const caps = await capsResp.json();
        if (!caps.push) {
          pushStatus.innerHTML = 'Push is <strong>disabled</strong>. Configure APNs credentials to enable — see <a href="https://github.com/leolobato/bambu-gateway/blob/main/docs/APNS.md" target="_blank">docs/APNS.md</a>.';
          deviceList.innerHTML = '';
          return;
        }
        pushStatus.innerHTML = 'Push is <strong>enabled</strong>. Devices register automatically when the iOS app launches and notifications are allowed.';

        const devResp = await fetch('/api/devices');
        const data = await devResp.json();
        renderDevices(data.devices || []);
      } catch (e) {
        pushStatus.textContent = 'Could not load push status.';
        deviceList.innerHTML = '';
      }
    }

    function renderDevices(devices) {
      if (!devices.length) {
        deviceList.innerHTML = '<p class="muted">No devices registered yet.</p>';
        return;
      }

      deviceList.innerHTML = devices.map(d => {
        const tokenBits = [];
        if (d.has_device_token) tokenBits.push('alert token');
        if (d.has_live_activity_start_token) tokenBits.push('push-to-start token');
        if (d.active_activity_count > 0) tokenBits.push(`${d.active_activity_count} active activity${d.active_activity_count === 1 ? '' : 's'}`);
        const tokens = tokenBits.length ? tokenBits.join(' · ') : 'no tokens';
        const subs = d.subscribed_printers.includes('*')
          ? 'all printers'
          : d.subscribed_printers.join(', ') || 'no printers';

        return `
          <div class="settings-card">
            <div class="settings-card-header">
              <strong>${esc(d.name) || d.id}</strong>
              <div class="settings-card-actions">
                <button class="btn-sm" onclick="testPush('${esc(d.id)}', '${esc(d.name)}')"
                        ${d.has_device_token ? '' : 'disabled'}>Test</button>
                <button class="btn-sm btn-danger" onclick="deleteDevice('${esc(d.id)}')">Delete</button>
              </div>
            </div>
            <div class="settings-card-detail">
              ${tokens} &middot; ${subs} &middot; last seen ${formatDateTime(d.last_seen_at)}
            </div>
          </div>
        `;
      }).join('');
    }

    async function testPush(deviceId, name) {
      pushMessage.textContent = `Sending test push to ${name || deviceId}…`;
      pushMessage.className = 'muted';
      try {
        const resp = await fetch(`/api/devices/${encodeURIComponent(deviceId)}/test`, {
          method: 'POST',
        });
        const data = await resp.json();
        if (resp.ok && data.status === 'ok') {
          pushMessage.textContent = `Test push sent to ${name || deviceId}.`;
          pushMessage.className = 'success';
        } else {
          pushMessage.textContent = data.detail || 'Test push failed.';
          pushMessage.className = 'error-text';
        }
        refreshPush();
      } catch (e) {
        pushMessage.textContent = 'Network error.';
        pushMessage.className = 'error-text';
      }
    }

    async function deleteDevice(deviceId) {
      if (!confirm('Remove this device from the push registry?')) return;
      try {
        const resp = await fetch(`/api/devices/${encodeURIComponent(deviceId)}`, {
          method: 'DELETE',
        });
        if (resp.ok) {
          pushMessage.textContent = 'Device removed.';
          pushMessage.className = 'success';
          refreshPush();
        } else {
          const data = await resp.json();
          pushMessage.textContent = data.detail || 'Delete failed.';
          pushMessage.className = 'error-text';
        }
      } catch (e) {
        pushMessage.textContent = 'Network error.';
        pushMessage.className = 'error-text';
      }
    }

    refresh();
    loadMachines();
    refreshPush();
  </script>
</body>
</html>
