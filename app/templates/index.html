<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bambu Gateway</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div id="server-down-banner" class="banner-error hidden">Server is unreachable</div>
  <header>
    <h1>Bambu Gateway</h1>
    <nav><a href="/settings">Settings</a></nav>
  </header>

  <main>
    <section id="printers">
      <h2>Printers</h2>
      <div id="printer-list"><p class="muted">Loading...</p></div>
    </section>

    <!-- Print workflow: Setup -->
    <section>
      <h2>Print a File</h2>

      <label for="printer-select">Printer</label>
      <select id="printer-select" style="margin-bottom:0.5rem">
        <option value="">Default</option>
      </select>

      <div id="ams-section" class="hidden">
        <label>Filament</label>
        <div id="ams-trays"></div>
      </div>

      <label for="file-input">3MF File</label>
      <input type="file" id="file-input" accept=".3mf">
    </section>

    <!-- File details (shown after parse) -->
    <section id="file-section" class="hidden">
      <h2>File Details</h2>
      <div class="plate-header">
        <div class="plate-header-info">
          <p id="file-status" class="muted"></p>
          <p id="sliced-file-note" class="warning-text hidden" style="margin-top:0.5rem">
            This 3MF already contains G-code. AMS tray profile selections and project filament overrides are not used for direct printing.
          </p>
          <div id="plate-picker" class="hidden">
            <label for="plate-select">Plate</label>
            <select id="plate-select"></select>
          </div>
        </div>
        <img id="plate-thumbnail" class="hidden" alt="Plate thumbnail">
      </div>

      <div id="profiles-section" class="hidden" style="margin-top:0.5rem">
        <div style="margin-bottom:0.5rem">
          <label for="machine-select">Machine Profile</label>
          <select id="machine-select">
            <option value="">Select machine...</option>
          </select>
        </div>

        <div style="margin-bottom:0.5rem">
          <label for="process-select">Process Profile</label>
          <select id="process-select">
            <option value="">Select process...</option>
          </select>
        </div>

        <div id="plate-type-row" class="hidden" style="margin-bottom:0.5rem">
          <label for="plate-type-select">Plate Type</label>
          <select id="plate-type-select">
            <option value="">Use file/default</option>
          </select>
        </div>
      </div>

      <div id="filaments-section" class="hidden" style="margin-top:0.5rem">
        <label>Project Filaments</label>
        <div id="project-filaments"></div>
      </div>
    </section>

    <!-- Submit (shown after parse) -->
    <section id="submit-section" class="hidden">
      <div class="btn-row">
        <button id="btn-print" type="button">Print</button>
        <button id="btn-preview" type="button" class="btn-secondary">Preview</button>
        <button id="btn-download-preview" type="button" class="btn-secondary hidden">Download 3MF</button>
        <button id="btn-confirm-print" type="button" class="hidden">Confirm Print</button>
      </div>
      <div id="slice-progress" class="hidden" style="margin-top:0.5rem">
        <div class="progress-bar">
          <div id="slice-progress-fill" class="progress-fill" style="width:0%"></div>
        </div>
        <div style="display:flex;align-items:center;gap:0.5rem;margin-top:0.25rem">
          <p id="slice-status" class="muted" style="font-size:0.8rem;margin:0"></p>
          <button id="btn-cancel-slice" type="button" class="btn-cancel">Cancel</button>
        </div>
      </div>
      <div id="upload-progress" class="hidden" style="margin-top:0.5rem">
        <div class="progress-bar">
          <div id="upload-progress-fill" class="progress-fill" style="width:0%"></div>
        </div>
        <div style="display:flex;align-items:center;gap:0.5rem;margin-top:0.25rem">
          <p id="upload-status" class="muted" style="font-size:0.8rem;margin:0"></p>
          <button id="btn-cancel-upload" type="button" class="btn-cancel">Cancel</button>
        </div>
      </div>
      <p id="submit-status" class="muted" style="margin-top:0.5rem"></p>
    </section>
  </main>

  <script>
    const printerList = document.getElementById('printer-list');
    const printerSelect = document.getElementById('printer-select');
    const amsSection = document.getElementById('ams-section');
    const amsTrays = document.getElementById('ams-trays');
    const fileInput = document.getElementById('file-input');
    const fileSection = document.getElementById('file-section');
    const fileStatus = document.getElementById('file-status');
    const slicedFileNote = document.getElementById('sliced-file-note');
    const plateThumbnail = document.getElementById('plate-thumbnail');
    const profilesSection = document.getElementById('profiles-section');
    const machineSelect = document.getElementById('machine-select');
    const processSelect = document.getElementById('process-select');
    const plateTypeRow = document.getElementById('plate-type-row');
    const plateTypeSelect = document.getElementById('plate-type-select');
    const platePicker = document.getElementById('plate-picker');
    const plateSelect = document.getElementById('plate-select');
    const filamentsSection = document.getElementById('filaments-section');
    const projectFilaments = document.getElementById('project-filaments');
    const submitSection = document.getElementById('submit-section');
    const btnPrint = document.getElementById('btn-print');
    const btnPreview = document.getElementById('btn-preview');
    const btnDownloadPreview = document.getElementById('btn-download-preview');
    const btnConfirmPrint = document.getElementById('btn-confirm-print');
    const sliceProgress = document.getElementById('slice-progress');
    const sliceProgressFill = document.getElementById('slice-progress-fill');
    const sliceStatus = document.getElementById('slice-status');
    const btnCancelSlice = document.getElementById('btn-cancel-slice');
    const uploadProgress = document.getElementById('upload-progress');
    const uploadProgressFill = document.getElementById('upload-progress-fill');
    const uploadStatusEl = document.getElementById('upload-status');
    const btnCancelUpload = document.getElementById('btn-cancel-upload');
    const submitStatus = document.getElementById('submit-status');

    let activeUploadId = null;       // upload_id for in-progress FTP transfer
    let activeAbortController = null; // AbortController for SSE fetch
    let uploadCancelled = false;

    let slicerFilaments = [];
    let slicerMachines = [];   // cached {name, setting_id} filtered for current printer
    let slicerProcesses = [];  // cached {name, setting_id} filtered for current printer
    let slicerPlateTypes = []; // cached {value, label}
    const defaultPlateTypes = [
      { value: 'cool_plate', label: 'Cool Plate' },
      { value: 'engineering_plate', label: 'Engineering Plate' },
      { value: 'high_temp_plate', label: 'High Temp Plate' },
      { value: 'textured_pei_plate', label: 'Textured PEI Plate' },
      { value: 'textured_cool_plate', label: 'Textured Cool Plate' },
      { value: 'supertack_plate', label: 'Supertack Plate' },
    ];
    let allSlicerMachines = []; // unfiltered, for name lookups
    let allSlicerProcesses = []; // unfiltered, for name lookups
    let allSlicerFilaments = []; // unfiltered, for file profile lookups
    let amsTraysData = [];     // cached AMS tray objects from API (includes vt_tray)
    let amsUnitsData = [];     // cached AMS unit objects from API
    let amsVtTrayData = null;  // cached external spool tray from API
    let printersData = [];     // cached printer status objects from API
    let parsedInfo = null;
    let filamentMatchesByIndex = {};
    let selectedFile = null;
    let currentPreviewId = null;
    let currentPreviewDownloadUrl = null;

    function resetPreviewState() {
      currentPreviewId = null;
      btnConfirmPrint.classList.add('hidden');
      btnDownloadPreview.classList.add('hidden');
      if (currentPreviewDownloadUrl) {
        URL.revokeObjectURL(currentPreviewDownloadUrl);
        currentPreviewDownloadUrl = null;
      }
    }

    function previewDownloadName() {
      if (!selectedFile || !selectedFile.name) return 'preview.3mf';
      return selectedFile.name.toLowerCase().endsWith('.3mf')
        ? selectedFile.name
        : `${selectedFile.name}.3mf`;
    }

    function setSlicedFileUI(isSliced) {
      slicedFileNote.classList.toggle('hidden', !isSliced);
      amsTrays.querySelectorAll('select').forEach(sel => {
        sel.disabled = isSliced;
      });
      projectFilaments.querySelectorAll('select').forEach(sel => {
        sel.disabled = isSliced;
      });
    }

    // --- Printer dashboard ---

    function stateClass(state) {
      if (state === 'printing') return 'badge printing';
      if (state === 'preparing') return 'badge preparing';
      if (state === 'paused') return 'badge paused';
      if (state === 'error') return 'badge error';
      if (state === 'idle' || state === 'finished') return 'badge idle';
      if (state === 'cancelled') return 'badge cancelled';
      return 'badge offline';
    }

    function stateLabel(p) {
      if (p.stage_name && ['preparing', 'paused', 'error'].includes(p.state)) {
        return p.stage_name;
      }
      return p.state;
    }

    function speedLabel(level) {
      const labels = { 1: 'Silent', 2: 'Standard', 3: 'Sport', 4: 'Ludicrous' };
      return labels[level] || '';
    }

    function formatMinutes(m) {
      if (!m) return '--';
      const h = Math.floor(m / 60);
      const min = m % 60;
      return h > 0 ? h + 'h ' + min + 'm' : min + 'm';
    }

    function renderPrinters(printers) {
      if (!printers.length) {
        printerList.innerHTML = '<p class="muted">No printers configured.</p>';
        return;
      }

      printerList.innerHTML = printers.map(p => {
        const hasJob = p.job && p.job.file_name;
        const isActive = ['printing', 'preparing', 'paused', 'error'].includes(p.state);

        let jobHtml = '';
        if (hasJob) {
          jobHtml = `
            <div class="job">
              <div class="job-file">${p.job.file_name}</div>
              <div class="progress-bar">
                <div class="progress-fill" style="width:${p.job.progress}%"></div>
              </div>
              <div class="job-details">
                ${p.job.progress}% &middot;
                Layer ${p.job.current_layer}/${p.job.total_layers} &middot;
                ${formatMinutes(p.job.remaining_minutes)} left
              </div>
            </div>`;
        }

        let controlsHtml = '';
        if (isActive && p.online) {
          const showPause = ['printing', 'preparing'].includes(p.state);
          const showResume = p.state === 'paused';
          controlsHtml = `
            <div class="printer-controls">
              ${showPause ? `<button class="btn-sm btn-control" onclick="printerCommand('${p.id}','pause')">Pause</button>` : ''}
              ${showResume ? `<button class="btn-sm btn-control" onclick="printerCommand('${p.id}','resume')">Resume</button>` : ''}
              <button class="btn-sm btn-danger" onclick="printerCommand('${p.id}','cancel')">Cancel</button>
              <span class="speed-control">
                <span>Speed</span>
                <select class="speed-select" data-printer="${p.id}" onchange="setSpeed(this)">
                  <option value="1"${p.speed_level===1 ? ' selected' : ''}>Silent</option>
                  <option value="2"${(p.speed_level===2||!p.speed_level) ? ' selected' : ''}>Standard</option>
                  <option value="3"${p.speed_level===3 ? ' selected' : ''}>Sport</option>
                  <option value="4"${p.speed_level===4 ? ' selected' : ''}>Ludicrous</option>
                </select>
              </span>
            </div>`;
        }

        const label = stateLabel(p);

        const t = p.temperatures;
        return `
          <div class="printer-card">
            <div class="printer-header">
              <strong>${p.name}</strong>
              ${p.machine_model ? `<span class="muted" style="font-size:0.8rem">${p.machine_model}</span>` : ''}
              <span class="${stateClass(p.state)}">${label}</span>
            </div>
            <div class="temps">
              Nozzle: ${t.nozzle_temp.toFixed(0)}/${t.nozzle_target.toFixed(0)}&deg;C &nbsp;
              Bed: ${t.bed_temp.toFixed(0)}/${t.bed_target.toFixed(0)}&deg;C
            </div>
            ${p.error_message ? `<div class="error-message">&#9888; ${p.error_message}</div>` : ''}
            ${jobHtml}
            ${controlsHtml}
          </div>`;
      }).join('');
    }

    function updatePrinterSelect(printers) {
      const current = printerSelect.value;
      printerSelect.innerHTML = '<option value="">Default</option>';
      printers.forEach(p => {
        const opt = document.createElement('option');
        opt.value = p.id;
        opt.textContent = p.name + (p.online ? '' : ' (offline)');
        printerSelect.appendChild(opt);
      });
      printerSelect.value = current;
    }

    async function printerCommand(printerId, command) {
      try {
        const resp = await fetch(`/api/printers/${printerId}/${command}`, { method: 'POST' });
        if (!resp.ok) {
          const data = await resp.json();
          console.error(`${command} failed:`, data.detail);
        }
        refreshPrinters();
      } catch (e) {
        console.error(`${command} error:`, e);
      }
    }

    async function setSpeed(selectEl) {
      const printerId = selectEl.dataset.printer;
      const level = parseInt(selectEl.value, 10);
      if (!level) return;
      try {
        const resp = await fetch(`/api/printers/${printerId}/speed`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ level }),
        });
        if (!resp.ok) {
          const data = await resp.json();
          console.error('Speed change failed:', data.detail);
        }
        refreshPrinters();
      } catch (e) {
        console.error('Speed error:', e);
      }
    }

    const serverDownBanner = document.getElementById('server-down-banner');

    async function refreshPrinters() {
      try {
        const resp = await fetch('/api/printers');
        const data = await resp.json();
        printersData = data.printers;
        renderPrinters(data.printers);
        updatePrinterSelect(data.printers);
        serverDownBanner.classList.add('hidden');
      } catch (e) {
        serverDownBanner.classList.remove('hidden');
      }
    }

    function getSelectedMachineId() {
      const pid = printerSelect.value;
      const printer = pid
        ? printersData.find(p => p.id === pid)
        : printersData[0];
      return printer ? printer.machine_model : '';
    }

    // --- Print workflow helpers ---

    function updateThumbnail(plateId) {
      if (!parsedInfo) return;
      const plate = parsedInfo.plates.find(p => p.id === plateId) || parsedInfo.plates[0];
      if (plate && plate.thumbnail) {
        plateThumbnail.src = plate.thumbnail;
        plateThumbnail.classList.remove('hidden');
      } else {
        plateThumbnail.classList.add('hidden');
      }
    }

    function colorHex(raw) {
      if (!raw) return '#ccc';
      const hex = raw.replace('#', '').slice(0, 6);
      return '#' + hex;
    }

    function trayLabel(tray) {
      if (tray.slot === 254) return 'Ext';
      const localId = tray.tray_id + 1;
      if (amsUnitsData.length > 1) {
        return `${tray.ams_id + 1}-A${localId}`;
      }
      return `A${localId}`;
    }

    function amsTypeName(amsType) {
      const names = { standard: 'AMS', lite: 'AMS Lite', pro: 'AMS 2 Pro', ht: 'AMS HT' };
      return names[amsType] || 'AMS';
    }

    function filamentOptionsHtml(selectedName, selectedId) {
      let html = '<option value="">Keep default</option>';
      for (const f of slicerFilaments) {
        const sel = (selectedName && f.name === selectedName)
          ? ' selected'
          : (!selectedName && f.setting_id === selectedId) ? ' selected' : '';
        html += `<option value="${f.setting_id}"${sel}>${f.name}</option>`;
      }
      return html;
    }

    function getTrayData(slot) {
      return amsTraysData.find(t => Number(t.slot) === Number(slot)) || null;
    }

    function getTrayProfileForSlot(slot) {
      const tray = getTrayData(slot);
      const traySelect = amsTrays.querySelector(`select[data-slot="${slot}"]`);
      if (traySelect && traySelect.value) {
        const opt = traySelect.options[traySelect.selectedIndex];
        return {
          settingId: traySelect.value,
          name: opt ? opt.textContent : '',
        };
      }
      return {
        settingId: tray && tray.matched_filament ? tray.matched_filament.setting_id : '',
        name: tray && tray.matched_filament ? tray.matched_filament.name : '',
      };
    }

    function getProjectFilamentId(filament) {
      const wantedId = filament.setting_id || '';
      const matchProfile = p => p.setting_id === wantedId || p.name === wantedId;
      const profile = slicerFilaments.find(matchProfile) || allSlicerFilaments.find(matchProfile);
      return profile && profile.filament_id ? profile.filament_id : '';
    }

    function getPreferredTraySlot(filament) {
      const backendMatch = filamentMatchesByIndex[filament.index];
      if (backendMatch && backendMatch.preferred_tray_slot != null) {
        return Number(backendMatch.preferred_tray_slot);
      }

      const projectFilamentId = (getProjectFilamentId(filament) || '').toUpperCase();
      if (projectFilamentId) {
        const exactMatch = amsTraysData.find(t => (t.filament_id || '').toUpperCase() === projectFilamentId);
        if (exactMatch) return Number(exactMatch.slot);
      }

      const typeMatch = amsTraysData.find(t =>
        t.tray_type && t.tray_type.toUpperCase() === (filament.type || '').toUpperCase()
      );
      return typeMatch ? Number(typeMatch.slot) : null;
    }

    function amsTrayOptionsHtml(filament) {
      let html = '<option value="">Keep default</option>';
      const selectedSlot = getPreferredTraySlot(filament);
      for (const t of amsTraysData) {
        const trayProfile = getTrayProfileForSlot(t.slot);
        const matched = trayProfile.name || (t.matched_filament ? t.matched_filament.name : t.tray_type);
        const sel = selectedSlot !== null && Number(t.slot) === selectedSlot ? ' selected' : '';
        const settingId = trayProfile.settingId;
        html += `<option value="${t.slot}" data-setting-id="${settingId}"${sel}>${trayLabel(t)} ${matched} (${t.tray_type})</option>`;
      }
      return html;
    }

    function renderProjectFilaments(preserveSelections = false) {
      if (!parsedInfo || parsedInfo.filaments.length === 0) {
        filamentsSection.classList.add('hidden');
        projectFilaments.innerHTML = '';
        setSlicedFileUI(parsedInfo ? parsedInfo.has_gcode : false);
        return;
      }

      const previousSelections = {};
      if (preserveSelections) {
        projectFilaments.querySelectorAll('select').forEach(sel => {
          previousSelections[sel.dataset.index] = sel.value;
        });
      }

      filamentsSection.classList.remove('hidden');
      projectFilaments.innerHTML = parsedInfo.filaments.map(f => `
        <div class="filament-row">
          <span class="filament-index">#${f.index}</span>
          <span class="color-swatch" style="background:${colorHex(f.color)}"></span>
          <span class="filament-type">${f.type || '\u2014'}</span>
          <span class="muted" style="font-size:0.75rem">${f.setting_id || ''}</span>
          ${parsedInfo.has_gcode ? '' : `
          <span class="filament-override">
            <select data-index="${f.index}">
              ${amsTrayOptionsHtml(f)}
            </select>
          </span>`}
        </div>
      `).join('');

      if (preserveSelections) {
        projectFilaments.querySelectorAll('select').forEach(sel => {
          const previousValue = previousSelections[sel.dataset.index];
          if (previousValue && Array.from(sel.options).some(opt => opt.value === previousValue)) {
            sel.value = previousValue;
          }
        });
      }

      setSlicedFileUI(parsedInfo.has_gcode);
    }

    async function loadFilamentMatches(filaments) {
      filamentMatchesByIndex = {};
      if (!filaments.length) return;

      const payload = { filaments };
      if (printerSelect.value) payload.printer_id = printerSelect.value;

      try {
        const resp = await fetch('/api/filament-matches', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });
        if (!resp.ok) return;
        const data = await resp.json();
        filamentMatchesByIndex = Object.fromEntries(
          (data.matches || []).map(match => [match.index, match])
        );
      } catch (e) {
        filamentMatchesByIndex = {};
      }
    }

    function populateProfileSelect(selectEl, profiles, fileSettingId, allProfiles) {
      selectEl.innerHTML = '<option value="">Select...</option>';

      // 3MF files store full profile names (e.g. "Bambu Lab P1S 0.4 nozzle")
      // while the API uses short codes (e.g. "GM014"), so match by both
      const matchProfile = (p, id) => p.setting_id === id || p.name === id;
      const inFiltered = fileSettingId && profiles.find(p => matchProfile(p, fileSettingId));
      const inAll = fileSettingId && !inFiltered && allProfiles &&
        allProfiles.find(p => matchProfile(p, fileSettingId));

      // If file profile is not in the filtered list, add it as a top option
      if (fileSettingId && !inFiltered) {
        const opt = document.createElement('option');
        opt.value = inAll ? inAll.setting_id : fileSettingId;
        if (inAll) {
          opt.textContent = inAll.name + ' (from file — different printer)';
        } else {
          opt.textContent = fileSettingId + ' (from file — unknown)';
        }
        opt.selected = true;
        selectEl.appendChild(opt);
      }

      for (const p of profiles) {
        const opt = document.createElement('option');
        opt.value = p.setting_id;
        if (inFiltered && matchProfile(p, fileSettingId)) {
          opt.textContent = p.name + ' (from file)';
          opt.selected = true;
        } else {
          opt.textContent = p.name;
        }
        selectEl.appendChild(opt);
      }
    }

    // --- Load setup data (AMS + slicer profiles, cached for later) ---

    function renderAMS(data) {
      amsUnitsData = data.units || [];
      amsVtTrayData = data.vt_tray || null;
      amsTraysData = data.trays || [];
      if (amsVtTrayData) {
        amsTraysData = [...amsTraysData, amsVtTrayData];
      }

      const hasTrays = data.trays && data.trays.length > 0;
      const hasVt = !!amsVtTrayData;
      if (!hasTrays && !hasVt) return false;

      amsSection.classList.remove('hidden');

      // Group trays by ams_id
      const traysByUnit = {};
      for (const t of (data.trays || [])) {
        if (!traysByUnit[t.ams_id]) traysByUnit[t.ams_id] = [];
        traysByUnit[t.ams_id].push(t);
      }

      const multiUnit = amsUnitsData.length > 1;
      let html = '';

      function renderTrayRow(t) {
        return `
          <div class="tray-row">
            <span class="tray-slot">${trayLabel(t)}</span>
            <span class="color-swatch" style="background:${colorHex(t.tray_color)}"></span>
            <span class="tray-type">${t.tray_type || '—'}</span>
            <span class="muted" style="min-width:5rem;font-size:0.75rem">${t.filament_id || ''}</span>
            <span class="tray-filament">
              <select data-slot="${t.slot}">
                ${filamentOptionsHtml(
                  t.matched_filament ? t.matched_filament.name : '',
                  t.matched_filament ? t.matched_filament.setting_id : ''
                )}
              </select>
            </span>
          </div>`;
      }

      for (const unit of amsUnitsData) {
        const unitTrays = traysByUnit[unit.id] || [];
        const typeName = unit.ams_type ? amsTypeName(unit.ams_type) : 'AMS';
        const unitLabel = multiUnit ? `${typeName} ${unit.id + 1}` : typeName;

        let infoItems = [];
        if (unit.ams_type !== 'lite' && unit.humidity >= 1 && unit.humidity <= 5) {
          const humidityLabels = {1: 'Dry', 2: 'Low', 3: 'Medium', 4: 'High', 5: 'Wet'};
          infoItems.push(`💧 ${humidityLabels[unit.humidity]}`);
        }
        if (unit.temperature > 0) infoItems.push(`${unit.temperature.toFixed(1)}°C`);
        if (unit.dry_time_remaining > 0) infoItems.push(`Drying: ${unit.dry_time_remaining}min`);

        html += `<div class="ams-unit">`;
        html += `<div class="ams-unit-header"><span>${unitLabel}</span></div>`;
        html += unitTrays.map(renderTrayRow).join('');
        if (infoItems.length) {
          html += `<div class="ams-unit-info">${infoItems.join(' · ')}</div>`;
        }
        html += `</div>`;
      }

      if (hasVt) {
        html += `<div class="ams-unit">`;
        html += `<div class="ams-unit-header"><span>External Spool</span></div>`;
        html += renderTrayRow(amsVtTrayData);
        html += `</div>`;
      }

      amsTrays.innerHTML = html;
      return true;
    }

    async function loadSetupData() {
      // Load machines first (needed to determine machine filter)
      const [amsRes, machinesRes] =
        await Promise.allSettled([
          fetch('/api/ams'),
          fetch('/api/slicer/machines'),
        ]);

      // Cache machines, filtered to the selected printer's model
      const machineId = getSelectedMachineId();
      if (machinesRes.status === 'fulfilled' && machinesRes.value.ok) {
        const allMachines = (await machinesRes.value.json()).map(m => ({
          name: m.name, setting_id: m.setting_id, printer_model: m.printer_model,
        }));
        allSlicerMachines = allMachines;
        const currentMachine = allMachines.find(m => m.setting_id === machineId);
        if (currentMachine) {
          slicerMachines = allMachines.filter(m => m.printer_model === currentMachine.printer_model);
        } else {
          slicerMachines = allMachines;
        }
      }

      // Load processes and filaments filtered by the selected printer's machine
      const machineParam = machineId ? `?machine=${encodeURIComponent(machineId)}` : '';

      const [processesRes, filamentsRes, allProcessesRes, allFilamentsRes, plateTypesRes] =
        await Promise.allSettled([
          fetch('/api/slicer/processes' + machineParam),
          fetch('/api/slicer/filaments' + machineParam),
          machineParam ? fetch('/api/slicer/processes') : Promise.resolve(null),
          machineParam ? fetch('/api/slicer/filaments') : Promise.resolve(null),
          fetch('/api/slicer/plate-types'),
        ]);

      // Slicer filaments (load before AMS so dropdowns can be populated)
      if (filamentsRes.status === 'fulfilled' && filamentsRes.value.ok) {
        const fdata = await filamentsRes.value.json();
        slicerFilaments = fdata.map(f => ({
          name: f.name,
          setting_id: f.setting_id,
          filament_id: f.filament_id || '',
        }));
      }
      if (allFilamentsRes.status === 'fulfilled' && allFilamentsRes.value && allFilamentsRes.value.ok) {
        const fdata = await allFilamentsRes.value.json();
        allSlicerFilaments = fdata.map(f => ({
          name: f.name,
          setting_id: f.setting_id,
          filament_id: f.filament_id || '',
        }));
      } else {
        allSlicerFilaments = slicerFilaments;
      }

      // AMS — the gateway waits internally for the first MQTT pushall on
      // cold-start, so a single fetch is enough.
      if (amsRes.status === 'fulfilled' && amsRes.value.ok) {
        const data = await amsRes.value.json();
        renderAMS(data);
      }

      // Cache processes
      if (processesRes.status === 'fulfilled' && processesRes.value.ok) {
        slicerProcesses = (await processesRes.value.json()).map(p => ({ name: p.name, setting_id: p.setting_id }));
      }

      // Cache unfiltered processes for name lookups
      if (allProcessesRes.status === 'fulfilled' && allProcessesRes.value && allProcessesRes.value.ok) {
        allSlicerProcesses = (await allProcessesRes.value.json()).map(p => ({ name: p.name, setting_id: p.setting_id }));
      } else {
        allSlicerProcesses = slicerProcesses;
      }

      // Cache plate type options
      if (plateTypesRes.status === 'fulfilled' && plateTypesRes.value.ok) {
        slicerPlateTypes = (await plateTypesRes.value.json()).map(p => ({
          value: p.value, label: p.label,
        }));
      } else {
        slicerPlateTypes = [];
      }
      if (slicerPlateTypes.length === 0) slicerPlateTypes = defaultPlateTypes;
      if (slicerPlateTypes.length > 0) {
        plateTypeSelect.innerHTML = '<option value="">Use file/default</option>' +
          slicerPlateTypes.map(p => `<option value="${p.value}">${p.label}</option>`).join('');
        plateTypeRow.classList.remove('hidden');
      } else {
        plateTypeSelect.innerHTML = '<option value="">Use file/default</option>';
        plateTypeRow.classList.add('hidden');
      }
    }

    // --- File parsing ---

    fileInput.addEventListener('change', async () => {
      fileSection.classList.add('hidden');
      submitSection.classList.add('hidden');
      profilesSection.classList.add('hidden');
      submitStatus.textContent = '';
      parsedInfo = null;
      filamentMatchesByIndex = {};
      selectedFile = null;
      resetPreviewState();
      setSlicedFileUI(false);

      const file = fileInput.files[0];
      if (!file) return;
      selectedFile = file;

      fileStatus.textContent = 'Parsing...';
      fileStatus.className = 'muted';
      fileSection.classList.remove('hidden');

      const formData = new FormData();
      formData.append('file', file);

      try {
        const resp = await fetch('/api/parse-3mf', { method: 'POST', body: formData });
        if (!resp.ok) {
          const err = await resp.json();
          fileStatus.textContent = err.detail || 'Parse failed';
          fileStatus.className = 'error-text';
          return;
        }
        parsedInfo = await resp.json();
      } catch (e) {
        fileStatus.textContent = 'Network error';
        fileStatus.className = 'error-text';
        return;
      }

      if (parsedInfo.has_gcode) {
        fileStatus.textContent = 'Already sliced';
        fileStatus.className = 'success';
        btnPreview.classList.add('hidden');
      } else {
        fileStatus.textContent = 'Needs slicing';
        fileStatus.className = 'muted';
        btnPreview.classList.remove('hidden');

        // Show machine/process selects, auto-selected from 3MF metadata
        if (slicerMachines.length > 0 || slicerProcesses.length > 0) {
          profilesSection.classList.remove('hidden');
          const wantedMachine = parsedInfo.printer ? parsedInfo.printer.printer_settings_id : '';
          const wantedProcess = parsedInfo.print_profile ? parsedInfo.print_profile.print_settings_id : '';
          populateProfileSelect(machineSelect, slicerMachines, wantedMachine, allSlicerMachines);
          populateProfileSelect(processSelect, slicerProcesses, wantedProcess, allSlicerProcesses);
        }
      }

      if (parsedInfo.plates.length > 1) {
        platePicker.classList.remove('hidden');
        plateSelect.innerHTML = parsedInfo.plates.map(p =>
          `<option value="${p.id}">Plate ${p.id}${p.name ? ' \u2014 ' + p.name : ''}</option>`
        ).join('');
      } else {
        platePicker.classList.add('hidden');
      }

      updateThumbnail(parsedInfo.plates[0] ? parsedInfo.plates[0].id : 0);

      if (parsedInfo.filaments.length > 0) {
        if (!parsedInfo.has_gcode) {
          await loadFilamentMatches(parsedInfo.filaments);
        }
        renderProjectFilaments();
      } else {
        filamentsSection.classList.add('hidden');
      }

      submitSection.classList.remove('hidden');
    });

    plateSelect.addEventListener('change', () => {
      updateThumbnail(parseInt(plateSelect.value, 10));
    });

    amsTrays.addEventListener('change', (event) => {
      if (!(event.target instanceof HTMLSelectElement)) return;
      if (!event.target.dataset.slot) return;
      renderProjectFilaments(true);
    });

    // --- Submit ---

    function buildFormData({ sliceOnly, preview } = {}) {
      const fd = new FormData();
      fd.append('file', selectedFile);

      const pid = printerSelect.value;
      if (pid) fd.append('printer_id', pid);

      if (parsedInfo.plates.length > 1) {
        fd.append('plate_id', plateSelect.value);
      }

      if (machineSelect.value) fd.append('machine_profile', machineSelect.value);
      if (processSelect.value) fd.append('process_profile', processSelect.value);
      if (plateTypeSelect.value) fd.append('plate_type', plateTypeSelect.value);

      const overrides = {};
      if (!parsedInfo.has_gcode) {
        projectFilaments.querySelectorAll('select').forEach(sel => {
          if (sel.value) {
            const trayProfile = getTrayProfileForSlot(sel.value);
            if (!trayProfile.settingId) {
              throw new Error(`AMS tray #${sel.value} has no slicing profile selected`);
            }
            overrides[sel.dataset.index] = {
              profile_setting_id: trayProfile.settingId,
              tray_slot: Number(sel.value),
            };
          }
        });
      }
      if (Object.keys(overrides).length > 0) {
        fd.append('filament_profiles', JSON.stringify(overrides));
      }

      if (sliceOnly) fd.append('slice_only', 'true');
      if (preview) fd.append('preview', 'true');
      return fd;
    }

    function hasDiscardedFilamentCustomizations(transfer) {
      if (!transfer || !Array.isArray(transfer.filaments)) return false;
      return transfer.filaments.some(f => f.status === 'filament_changed' && f.discarded && f.discarded.length);
    }

    function settingsTransferMessage(transfer) {
      if (!transfer) return '';
      const parts = [];
      if (transfer.status === 'applied' && transfer.transferred && transfer.transferred.length) {
        const keys = transfer.transferred.map(s => s.key).join(', ');
        parts.push(`Transferred ${transfer.transferred.length} process setting(s): ${keys}`);
      }
      const filaments = Array.isArray(transfer.filaments) ? transfer.filaments : [];
      for (const f of filaments) {
        if (f.status === 'applied' && f.transferred && f.transferred.length) {
          const keys = f.transferred.map(s => s.key).join(', ');
          parts.push(`Filament slot ${f.slot}: applied ${f.transferred.length} customization(s) (${keys}).`);
        } else if (f.status === 'filament_changed' && f.discarded && f.discarded.length) {
          parts.push(
            `Filament slot ${f.slot}: discarded ${f.discarded.length} customization(s) ` +
            `(${f.discarded.join(', ')}) — replaced ${f.original_filament || '(unknown)'} with ${f.selected_filament || '(unknown)'}.`
          );
        }
      }
      return parts.join(' ');
    }

    function settingsTransferFromHeaders(resp) {
      const status = resp.headers.get('X-Settings-Transfer-Status') || '';
      let transferred = [];
      const raw = resp.headers.get('X-Settings-Transferred');
      if (raw) {
        try { transferred = JSON.parse(raw); } catch (e) {}
      }
      let filaments = [];
      const rawFil = resp.headers.get('X-Filament-Settings-Transferred');
      if (rawFil) {
        try { filaments = JSON.parse(rawFil); } catch (e) {}
      }
      if (!status && !filaments.length) return null;
      return { status, transferred, filaments };
    }

    async function streamSlice(formData, onEvent, signal) {
      const resp = await fetch('/api/print-stream', { method: 'POST', body: formData, signal });
      if (!resp.ok) {
        const data = await resp.json();
        throw new Error(data.detail || 'Request failed');
      }
      const reader = resp.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        const parts = buffer.split('\n\n');
        buffer = parts.pop();
        for (const raw of parts) {
          if (!raw.trim()) continue;
          let eventType = '', data = '';
          for (const line of raw.split('\n')) {
            if (line.startsWith('event: ')) eventType = line.slice(7);
            else if (line.startsWith('data: ')) data += line.slice(6);
          }
          if (eventType && data) {
            try { onEvent(eventType, JSON.parse(data)); }
            catch (e) { onEvent(eventType, { raw: data }); }
          }
        }
      }
    }

    function setButtonsDisabled(disabled) {
      btnPrint.disabled = disabled;
      btnPreview.disabled = disabled;
      btnDownloadPreview.disabled = disabled;
      btnConfirmPrint.disabled = disabled;
    }

    function beginSliceUI() {
      setButtonsDisabled(true);
      sliceProgress.classList.remove('hidden');
      sliceProgressFill.style.width = '0%';
      sliceStatus.textContent = 'Preparing...';
      submitStatus.textContent = '';
      submitStatus.className = 'muted';
    }

    function endSliceUI() {
      sliceProgress.classList.add('hidden');
      setButtonsDisabled(false);
    }

    function formatBytes(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1048576) return (bytes / 1024).toFixed(0) + ' KB';
      return (bytes / 1048576).toFixed(1) + ' MB';
    }

    function showUploadProgress(percent, bytesSent, totalBytes) {
      uploadProgress.classList.remove('hidden');
      uploadProgressFill.style.width = percent + '%';
      uploadStatusEl.textContent = 'Uploading to printer... ' + percent + '%' +
        (totalBytes ? ' (' + formatBytes(bytesSent) + ' / ' + formatBytes(totalBytes) + ')' : '');
    }

    function hideUploadProgress() {
      uploadProgress.classList.add('hidden');
      uploadProgressFill.style.width = '0%';
      uploadStatusEl.textContent = '';
    }

    async function pollUploadProgress(uploadId) {
      activeUploadId = uploadId;
      while (true) {
        await new Promise(r => setTimeout(r, 300));
        if (uploadCancelled) {
          return { ok: false, error: 'Upload cancelled' };
        }
        let data;
        try {
          const resp = await fetch('/api/uploads/' + uploadId);
          if (!resp.ok) break;
          data = await resp.json();
        } catch (e) {
          break;
        }
        showUploadProgress(data.progress, data.bytes_sent, data.total_bytes);
        if (data.status === 'completed') {
          return { ok: true };
        }
        if (data.status === 'failed') {
          return { ok: false, error: data.error || 'Upload failed' };
        }
        if (data.status === 'cancelled') {
          return { ok: false, error: 'Upload cancelled' };
        }
      }
      return { ok: false, error: 'Lost connection to server' };
    }

    function handleProgressEvent(event, data) {
      if (event === 'status') {
        if (data.phase === 'uploading') {
          sliceProgress.classList.add('hidden');
          if (data.upload_id) activeUploadId = data.upload_id;
          showUploadProgress(0, 0, 0);
        } else {
          sliceStatus.textContent = data.message || data.phase;
        }
      } else if (event === 'progress') {
        if (data.percent != null) {
          sliceProgressFill.style.width = data.percent + '%';
          sliceStatus.textContent = 'Slicing... ' + data.percent + '%';
        }
      } else if (event === 'upload_progress') {
        showUploadProgress(data.percent, data.bytes_sent, data.total_bytes);
      } else if (event === 'error') {
        submitStatus.textContent = data.error || 'Slicing failed';
        submitStatus.className = 'error-text';
      } else if (event === 'done') {
        endSliceUI();
        hideUploadProgress();
      }
    }

    async function cancelActiveUpload() {
      uploadCancelled = true;
      // Cancel the SSE stream if active
      if (activeAbortController) {
        activeAbortController.abort();
      }
      // Cancel the FTP upload on the server
      if (activeUploadId) {
        try {
          await fetch('/api/uploads/' + activeUploadId + '/cancel', { method: 'POST' });
        } catch (e) { /* ignore */ }
      }
    }

    btnCancelUpload.addEventListener('click', () => cancelActiveUpload());
    btnCancelSlice.addEventListener('click', () => cancelActiveUpload());

    btnPrint.addEventListener('click', async () => {
      if (!selectedFile) return;

      if (parsedInfo.has_gcode) {
        setButtonsDisabled(true);
        uploadCancelled = false;
        activeUploadId = null;
        submitStatus.textContent = 'Submitting...';
        submitStatus.className = 'muted';
        try {
          const resp = await fetch('/api/print', { method: 'POST', body: buildFormData() });
          const data = await resp.json();
          if (!resp.ok) {
            submitStatus.textContent = data.detail || 'Print failed';
            submitStatus.className = 'error-text';
            setButtonsDisabled(false);
            return;
          }
          if (data.upload_id) {
            showUploadProgress(0, 0, 0);
            const result = await pollUploadProgress(data.upload_id);
            hideUploadProgress();
            if (result.ok) {
              submitStatus.textContent = `Print started: ${data.file_name}`;
              submitStatus.className = 'success';
            } else {
              submitStatus.textContent = result.error;
              submitStatus.className = 'error-text';
            }
          } else {
            submitStatus.textContent = `Print started: ${data.file_name}`;
            submitStatus.className = 'success';
          }
        } catch (e) {
          submitStatus.textContent = 'Network error';
          submitStatus.className = 'error-text';
        }
        hideUploadProgress();
        setButtonsDisabled(false);
        return;
      }

      uploadCancelled = false;
      activeUploadId = null;
      activeAbortController = new AbortController();
      beginSliceUI();
      try {
        await streamSlice(buildFormData(), (event, data) => {
          if (event === 'print_started') {
            const transferMsg = settingsTransferMessage(data.settings_transfer);
            submitStatus.textContent = 'Print started: ' + data.file_name +
              (transferMsg ? '\n' + transferMsg : '');
            submitStatus.className = hasDiscardedFilamentCustomizations(data.settings_transfer)
              ? 'warning-text' : 'success';
          } else {
            handleProgressEvent(event, data);
          }
        }, activeAbortController.signal);
      } catch (e) {
        if (e.name === 'AbortError') {
          submitStatus.textContent = 'Cancelled';
          submitStatus.className = 'muted';
        } else {
          submitStatus.textContent = e.message || 'Network error';
          submitStatus.className = 'error-text';
        }
        endSliceUI();
      }
      activeAbortController = null;
    });

    btnPreview.addEventListener('click', async () => {
      if (!selectedFile) return;
      resetPreviewState();
      uploadCancelled = false;
      activeUploadId = null;
      activeAbortController = new AbortController();
      beginSliceUI();
      try {
        await streamSlice(buildFormData({ preview: true }), (event, data) => {
          if (event === 'result') {
            currentPreviewId = data.preview_id;
            // Update thumbnail with sliced plate image
            if (data.file_base64) {
              // Re-parse the sliced 3MF to get its thumbnail
              const bytes = atob(data.file_base64);
              const arr = new Uint8Array(bytes.length);
              for (let i = 0; i < bytes.length; i++) arr[i] = bytes.charCodeAt(i);
              const blob = new Blob([arr], { type: 'application/octet-stream' });
              currentPreviewDownloadUrl = URL.createObjectURL(blob);
              btnDownloadPreview.classList.remove('hidden');
              const parseForm = new FormData();
              parseForm.append('file', new File([blob], selectedFile.name));
              fetch('/api/parse-3mf', { method: 'POST', body: parseForm })
                .then(r => r.ok ? r.json() : null)
                .then(info => {
                  if (info && info.plates && info.plates[0] && info.plates[0].thumbnail) {
                    plateThumbnail.src = info.plates[0].thumbnail;
                    plateThumbnail.classList.remove('hidden');
                  }
                });
            }

            const transfer = data.settings_transfer;
            const transferMsg = settingsTransferMessage(transfer);
            submitStatus.textContent = 'Preview ready.' +
              (transferMsg ? '\n' + transferMsg : '');
            submitStatus.className = hasDiscardedFilamentCustomizations(transfer)
              ? 'warning-text' : 'success';
            btnConfirmPrint.classList.remove('hidden');
          } else {
            handleProgressEvent(event, data);
          }
        }, activeAbortController.signal);
      } catch (e) {
        if (e.name === 'AbortError') {
          submitStatus.textContent = 'Cancelled';
          submitStatus.className = 'muted';
        } else {
          submitStatus.textContent = e.message || 'Network error';
          submitStatus.className = 'error-text';
        }
        endSliceUI();
      }
      activeAbortController = null;
    });

    btnDownloadPreview.addEventListener('click', () => {
      if (!currentPreviewDownloadUrl) return;
      const link = document.createElement('a');
      link.href = currentPreviewDownloadUrl;
      link.download = previewDownloadName();
      document.body.appendChild(link);
      link.click();
      link.remove();
    });

    btnConfirmPrint.addEventListener('click', async () => {
      if (!currentPreviewId) return;
      setButtonsDisabled(true);
      uploadCancelled = false;
      activeUploadId = null;
      submitStatus.textContent = 'Sending to printer...';
      submitStatus.className = 'muted';
      try {
        const fd = new FormData();
        fd.append('preview_id', currentPreviewId);
        const resp = await fetch('/api/print', { method: 'POST', body: fd });
        const data = await resp.json();
        if (!resp.ok) {
          submitStatus.textContent = data.detail || 'Print failed';
          submitStatus.className = 'error-text';
          setButtonsDisabled(false);
          return;
        }
        if (data.upload_id) {
          showUploadProgress(0, 0, 0);
          const result = await pollUploadProgress(data.upload_id);
          hideUploadProgress();
          if (result.ok) {
            submitStatus.textContent = `Print started: ${data.file_name}`;
            submitStatus.className = 'success';
            currentPreviewId = null;
            btnConfirmPrint.classList.add('hidden');
          } else {
            submitStatus.textContent = result.error;
            submitStatus.className = 'error-text';
          }
        } else {
          submitStatus.textContent = `Print started: ${data.file_name}`;
          submitStatus.className = 'success';
          currentPreviewId = null;
          btnConfirmPrint.classList.add('hidden');
        }
      } catch (e) {
        submitStatus.textContent = 'Network error';
        submitStatus.className = 'error-text';
      }
      hideUploadProgress();
      setButtonsDisabled(false);
    });

    // --- Init ---

    refreshPrinters().then(() => loadSetupData());
    setInterval(() => {
      if (document.hidden) return;
      refreshPrinters();
    }, 4000);
    document.addEventListener('visibilitychange', () => {
      if (!document.hidden) {
        refreshPrinters();
      }
    });
  </script>
</body>
